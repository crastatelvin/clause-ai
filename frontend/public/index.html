<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14110e" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="CLAUSE — AI Contract & Document Risk Analyzer by Telvin Crasta" />
    <title>CLAUSE — AI Contract Risk Analyzer</title>
    <script>
      // Resolve theme before React paints to avoid a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem('clause-theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : prefersDark
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
